<div class="form-success" role="status" aria-live="polite">
  <div class="success-icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="12" cy="12" r="10"/>
      <path d="M9 12l2 2 4-4"/>
    </svg>
  </div>
  {% if kind == "callback" %}
    <h3 class="success-title">Заявку отримано!</h3>
    <p class="success-text">Ми передзвонимо вам найближчим часом.<br>Дякуємо за звернення.</p>
  {% else %}
    <h3 class="success-title">Повідомлення надіслано!</h3>
    <p class="success-text">Ми відповімо вам найближчим часом.<br>Дякуємо за звернення.</p>
  {% endif %}
  <a href="tel:+380976962409" class="btn btn-call btn-success-call">
    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
    </svg>
    Подзвонити зараз
  </a>
</div>
