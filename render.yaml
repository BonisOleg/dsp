databases:
  - name: dsp-db
    plan: free
    region: frankfurt
    databaseName: dsp
    user: dsp

services:
  - type: web
    name: dsp-web
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput"
    startCommand: "gunicorn config.wsgi:application --workers 2 --threads 2 --timeout 60"
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: SECURE_SSL_REDIRECT
        value: "True"

      - key: PGHOST
        fromDatabase:
          name: dsp-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: dsp-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: dsp-db
          property: database
      - key: PGUSER
        fromDatabase:
          name: dsp-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: dsp-db
          property: password

      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: NOTIFICATION_EMAIL
        sync: false

      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
